<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="chat-card" aria-label="Chat">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 3a6.5 6.5 0 0 0-6.36 7.82A4.5 4.5 0 0 0 7.5 19h1.12l2.55 2.05a1.3 1.3 0 0 0 2.1-1.02V19h3.23a4.5 4.5 0 0 0 1.86-8.6A6.5 6.5 0 0 0 12 3Z"/>
              <path d="M9 12h.01M12 12h.01M15 12h.01"/>
            </svg>
          </div>
          <div>
            <h1>Support</h1>
            <p><span class="status-dot"></span>Online</p>
          </div>
        </div>
        <button id="new-chat-btn" class="icon-button" type="button" aria-label="Start a new chat" title="New chat">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </header>

      <div id="messages" class="messages" aria-live="polite" aria-label="Conversation">
        <div id="welcome" class="welcome">
          <div class="welcome-mark" aria-hidden="true">S</div>
          <h2>How can I help today?</h2>
          <p>Ask a question or get help with your work.</p>
          <div class="suggestions" aria-label="Suggested prompts">
            <button type="button" data-prompt="Explain a complex topic in simple terms">Explain something simply</button>
            <button type="button" data-prompt="Help me brainstorm ideas for a new project">Brainstorm project ideas</button>
            <button type="button" data-prompt="Review this plan and suggest improvements: ">Review a plan</button>
          </div>
        </div>
      </div>

      <div id="error-banner" class="error-banner" role="alert" hidden>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8v5M12 16h.01"/><circle cx="12" cy="12" r="9"/></svg>
        <span id="error-message"></span>
        <button id="dismiss-error" type="button" aria-label="Dismiss error">×</button>
      </div>

      <div class="composer-wrap">
        <form id="chat-form" class="chat-form">
          <label class="sr-only" for="prompt-input">Your message</label>
          <textarea
            id="prompt-input"
            rows="1"
            maxlength="4000"
            placeholder="Type a message..."
            autocomplete="off"
            required
          ></textarea>
          <button id="send-btn" type="submit" aria-label="Send message">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m5 12 7-7 7 7M12 19V5"/>
            </svg>
          </button>
        </form>
        <div class="composer-meta">
          <span>Enter to send · Shift + Enter for a new line</span>
          <span id="char-count">0 / 4000</span>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
